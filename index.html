<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Meu Amor ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="overlay" class="overlay">
        <div class="intro-content">
            <h1>3 meses de uma história incrível...</h1>
            <button id="start-btn">Iniciar Tour ❤️</button>
        </div>
    </div>

    <main id="main-content" class="hidden">
        <nav>
            <h2>Nossos Momentos</h2>
        </nav>
        
        <section class="hero">
            <img src="assets/images/foto-principal.jpg" alt="Nossa Foto" class="main-photo">
            <p>Desde o dia 29, minha vida ficou mais colorida.</p>
        </section>

        <div class="music-player">
            <iframe src="https://open.spotify.com/embed/playlist/SUA_PLAYLIST_ID" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></div>
        </div>
    </main>

    <script src="script.js"></script>

    <div class="spotify-fixed">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/SUA_PLAYLIST_ID?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

</body>
</html>
