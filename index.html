<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Meu Amor ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="overlay" class="overlay">
        <div class="intro-content">
            <h1>3 meses de uma história incrível...</h1>
            <button id="start-btn">Iniciar Tour ❤️</button>
        </div>
    </div>

    <main id="main-content" class="hidden">
        <nav>
            <h2>Nossos Momentos</h2>
        </nav>
        
        <section class="hero">
            <img src="assets/images/foto-principal.jpg" alt="Nossa Foto" class="main-photo">
            <p>Desde o dia 29, minha vida ficou mais colorida.</p>
        </section>

        <div class="music-player">
            <iframe src="https://open.spotify.com/embed/playlist/SUA_PLAYLIST_ID" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
